apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  namespace: todo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-state-metrics
  template:
    metadata:
      labels:
        app: kube-state-metrics
    spec:
      containers:
      - name: kube-state-metrics
        image: k8s.gcr.io/kube-state-metrics/kube-state-metrics:v2.10.0
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: kube-state-metrics
  namespace: todo-app
spec:
  selector:
    app: kube-state-metrics
  ports:
    - port: 8080
      targetPort: 8080